        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

        <script>
        (function () {
          try {
            var raw = localStorage.getItem('atlas_theme') || localStorage.getItem('atlas-theme') || localStorage.getItem('lumen_theme');
            var theme = (raw === 'dark' || raw === 'light') ? raw : null;
            if (!theme && window.matchMedia) {
              theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            }
            theme = theme || 'dark';
            var root = document.documentElement;
            root.classList.add('theme-' + theme, theme);
            root.setAttribute('data-theme', theme);
            root.style.colorScheme = theme;
            root.style.backgroundColor = theme === 'light' ? '#FAF8F4' : '#13151A';
          } catch (_) { /* never block render */ }
        })();
        </script>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="preload"
              as="style"
              href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
              onload="this.onload=null;this.rel='stylesheet'" />

        </noscript>
        <div id="root"></div>
